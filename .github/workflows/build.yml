name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
            os_label: 'Mac'
            artifact_suffix: 'darwin_arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
            os_label: 'Mac'
            artifact_suffix: 'darwin_x64'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''
            os_label: 'Linux'
            artifact_suffix: 'linux_amd64'
          - platform: 'windows-latest'
            args: ''
            rust_target: ''
            os_label: 'Win10'
            artifact_suffix: 'windows_x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${VERSION#v}
          echo "Setting version to $VERSION"
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version='$VERSION'; fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null+2));"
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'PKU Course Desktop ${{ github.event.inputs.version || github.ref_name }}'
          releaseAssetNamePattern: '${{ env.VERSION }}_${{ matrix.os_label }}_${{ matrix.artifact_suffix }}{{ ext }}'
          releaseBody: |
            ## PKU Course Desktop ${{ github.event.inputs.version || github.ref_name }}

            PKU Course Desktop - PKU course video downloader.

            ### Downloads
            - **macOS**: `.dmg` (Apple Silicon & Intel)
            - **Linux**: `.AppImage` / `.deb`
            - **Windows**: `.msi` / `.exe`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
